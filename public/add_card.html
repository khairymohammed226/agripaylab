  <!-- Main -->
  <div class="main">
    <div class="form-container">

      <h2>Add Your Card</h2>

      <form id="cardForm">
        <input type="text" id="cardName" placeholder="Card Holder Name" required>
        <input type="text" id="accountNumber" placeholder="Account Number" required>

        <select id="cardType" required>
          <option value="">Select Card Type</option>
          <option value="debit">Debit</option>
          <option value="credit">Credit</option>
        </select>

       <input 
  type="text"
  id="expiry"
  placeholder="MM/YY"
  maxlength="5"
>
        <input 
  type="text"
  id="cvv"
  placeholder="CVV"
  maxlength="3"
  inputmode="numeric"
  pattern="\d{3}"
>
        <input type="password" id="cardPassword" placeholder="Card Password" required>

<button type="submit">Save Card</button>
</form>

<div id="cardMessage" class="message"></div>


    </div>
  </div>

<script src="js/add_card.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
