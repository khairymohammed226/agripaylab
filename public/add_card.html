<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>💳 Add Card - Crédit Agricole</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      background: url('https://images.unsplash.com/photo-1521791136064-7986c2920216')
        no-repeat center center / cover;
    }

    /* ===== Navbar ===== */
    .top-nav {
      background-color: rgba(255, 255, 255, 0.35);
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 60px;
      position: fixed;
      top: 20px;
      left: 3%;
      border-radius: 12px;
      width: 84%;
      z-index: 1000;
    }
    .top-nav .logo img {
  height: 55px;
  cursor: pointer;
}


 .top-nav ul {
  list-style: none;
  display: flex;
  gap: 40px;
  margin-left: auto; 
}

    .top-nav ul li a {
      text-decoration: none;
      color: black;
      font-weight: bold;
    }

    /* ===== Main ===== */
   .main {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: flex-start; 
  margin-top: 140px;       
}
    .form-container {
      background-color: rgba(255, 255, 255, 0.95);
      padding: 40px 50px;
      border-radius: 20px;
      width: 420px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
    }

    h2 {
      text-align: center;
      color: #0b5134;
      margin-bottom: 25px;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin-bottom: 18px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 15px;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background-color: #007b5e;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background-color: #046b52;
    }
    .message {
  margin-top: 15px;
  padding: 12px;
  border-radius: 10px;
  font-weight: bold;
  display: none;
}

.message.success {
  background-color: #d4edda;
  color: #155724;
  border: 1px solid #c3e6cb;
}

.message.error {
  background-color: #f8d7da;
  color: #721c24;
  border: 1px solid #f5c6cb;
}

  </style>
</head>

<body>

  <div class="top-nav">
  <div class="logo">
    <a href="home.html">
     <img src="image/Picsart_25-10-01_17-11-01-636.png" alt="Logo">
    </a>
  </div>

  <ul>
    <li><a href="home.html">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="contact.html">Contact</a></li>
    <li><a href="login.html">Login</a></li>
    <li><a href="register.html" class="signup">Sign Up</a></li>
  </ul>
</div>  

  <!-- Main -->
  <div class="main">
    <div class="form-container">

      <h2>Add Your Card</h2>

      <form id="cardForm">
        <input type="text" id="cardName" placeholder="Card Holder Name" required>
        <input type="text" id="accountNumber" placeholder="Account Number" required>

        <select id="cardType" required>
          <option value="">Select Card Type</option>
          <option value="debit">Debit</option>
          <option value="credit">Credit</option>
        </select>

       <input 
  type="text"
  id="expiry"
  placeholder="MM/YY"
  maxlength="5"
>
        <input 
  type="text"
  id="cvv"
  placeholder="CVV"
  maxlength="3"
  inputmode="numeric"
  pattern="\d{3}"
>
        <input type="password" id="cardPassword" placeholder="Card Password" required>

<button type="submit">Save Card</button>
</form>

<div id="cardMessage" class="message"></div>


    </div>
  </div>

  
<script>

document.getElementById("cardForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const messageDiv = document.getElementById("cardMessage");

  const cardName = document.getElementById("cardName").value;
  const accountNumber = document.getElementById("accountNumber").value;
  const cardType = document.getElementById("cardType").value;
  const expiryDate = document.getElementById("expiry").value;
  const cvv = document.getElementById("cvv").value;
  const cardPassword = document.getElementById("cardPassword").value;

  const user = JSON.parse(localStorage.getItem("currentUser"));
 

// تحقق MM/YY
if (!/^(0[1-9]|1[0-2])\/\d{2}$/.test(expiryDate)) {
  messageDiv.style.display = "block";
  messageDiv.textContent = "❌ ادخل تاريخ صحيح بصيغة MM/YY";
  messageDiv.className = "message error";
  return;
}
  try {

    const response = await fetch("http://localhost:3000/add-card", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        userId: user._id,
        cardName,
        accountNumber,
        cardType,
        expiryDate,
        cvv,
        cardPassword
      })
    });

    const data = await response.json();

    messageDiv.style.display = "block";
    messageDiv.textContent = data.message;

    if (response.ok) {
      messageDiv.className = "message success";

      // بعد ثانيتين يروح للدashboard
      setTimeout(() => {
        window.location.href = "dashboard.html";
      }, 3000);

    } else {
      messageDiv.className = "message error";
    }

  } catch (err) {
    console.error(err);

    messageDiv.style.display = "block";
    messageDiv.textContent = "Server error";
    messageDiv.className = "message error";
  }

});
const expiryInput = document.getElementById("expiry");

if (expiryInput) {
  expiryInput.addEventListener("input", function () {

    // يشيل أي حاجة مش رقم
    let value = this.value.replace(/\D/g, "");

    // يحط / بعد أول رقمين
    if (value.length >= 3) {
      value = value.slice(0,2) + "/" + value.slice(2,4);
    }

    this.value = value;
  });
}
</script>


</body>
</html>
