<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATM Deposit</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="icon" type="image/png" href="image/logo.png">
  <link rel="apple-touch-icon" href="image/logo.png">

  <script>
    if (sessionStorage.getItem("isLoggedIn") !== "true") {
      window.location.href = "login.html";
    }
  </script>

  <link rel="stylesheet" href="css/atm-simulator.css">
</head>

<body>

<div class="card">

  <div class="header">
    <div class="brand">
      <img src="image/logomain.png">
    </div>

    <div class="nav">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </div>
  </div>

  <div class="body">
<div class="sidebar">

  <a class="item" href="dashboard.html">
    <img src="https://i.postimg.cc/Dyp5hp80/dashboard.png" width="20">
    <span>Dashboard</span>
  </a>

  <a class="item" href="bank.html">
    <img src="https://i.postimg.cc/J06F91fn/arrows.png" width="20">
    <span>Transfer</span>
  </a>

  <a class="item" href="card.html">
    <img src="https://i.postimg.cc/h41c2ThY/debit-card.png" width="20">
    <span>Card</span>
  </a>

  <a class="item active" href="atm.html">
    <img src="https://i.postimg.cc/6Q97GhJk/atm-machine.png" width="20">
    <span>ATM</span>
  </a>

  <a class="item" href="profile.html">
    <img src="https://i.postimg.cc/0292vZLx/account.png" width="20">
    <span>Profile</span>
  </a>

  <a class="item" href="login.html">
    <img src="https://i.postimg.cc/fycLKrpP/logout.png" width="20">
    <span>Logout</span>
  </a>

</div>

    <div class="main">

      <div class="send-box">

        <h2 style="text-align:center; margin-bottom:15px;">
          💰 ATM Deposit
        </h2>

        <!-- OTP -->
        <input type="text" id="otp" placeholder="Enter OTP">

        <!-- بيانات بعد التحقق -->
        <div id="depositInfo" style="display:none; text-align:center; margin-top:10px;">

          <h4 id="userName"></h4>
          <p id="accountNumber"></p>

          <h3 id="amountBox"></h3>

          <button id="insertBtn">Insert Cash 💵</button>

        </div>

        <button id="verifyBtn">Verify OTP</button>
        <button id="backBtn">⬅ Back to ATM</button>

        <div id="atmMessage" class="atm-message"></div>

      </div>

    </div>

  </div>

</div>

<script src="js/atm-deposit.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/transitions.js"></script>
</body>
</html>
