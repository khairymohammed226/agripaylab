<html lang="en">
<head>

 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="icon" type="image/png" href="image/logo.png">
<link rel="apple-touch-icon" href="image/logo.png">
 <script>
  if (sessionStorage.getItem("isLoggedIn") !== "true") {
  window.location.href = "login.html";
}
 </script>

  <link rel="stylesheet" href="css/atm-simulator.css">
</head>

<body>

<div class="card">

  <!-- 🔵 Header -->
  <div class="header">
    <div class="brand">
      <img src="image/Logo.png">
    </div>

    <div class="nav">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </div>
  </div>

  <div class="main-container">

  <div class="sidebar-wrapper">

    <a href="dashboard.html" class="sidebar-box">
      <img src="https://i.postimg.cc/Dyp5hp80/dashboard.png">
      Dashboard
    </a>

    <a href="bank.html" class="sidebar-box">
      <img src="https://i.postimg.cc/J06F91fn/arrows.png">
      Transfer
    </a>

    <a href="card.html" class="sidebar-box">
      <img src="https://i.postimg.cc/h41c2ThY/debit-card.png">
      Card
    </a>

    <a href="atm.html" class="sidebar-box active">
      <img src="https://i.postimg.cc/6Q97GhJk/atm-machine.png">
      ATM
    </a>

    <a href="profile.html" class="sidebar-box">
      <img src="https://i.postimg.cc/0292vZLx/account.png">
      Profile
    </a>

      <img src="https://i.postimg.cc/fycLKrpP/logout.png">
      Logout
    </a>

  </div>

  <div class="dashboard-content">

    <div class="send-box">

      <h2 style="text-align:center; margin-bottom:15px;">
        🏧 ATM Simulator
      </h2>

      <input type="password" id="pin" placeholder="Enter PIN" maxlength="4">

      <input type="text" id="otp" placeholder="Enter OTP">

      <input type="number" id="amount" placeholder="Enter Amount">

      <button id="withdrawBtn">Withdraw</button>

      <button id="backBtn">⬅ Back to ATM</button>

      <div id="atmMessage" class="atm-message"></div>

    </div>

  </div>

</div>
 <script src="js/atm-simulator.js"></script>
 <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
