<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CA Bank Dashboard</title>
  <link rel="icon" type="image/png" href="image/logo.png">
<link rel="apple-touch-icon" href="image/logo.png">
<script>
if (sessionStorage.getItem("isLoggedIn") !== "true") {
  window.location.href = "login.html";
}
</script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/atm.css">

</head>

<body>
<div class="card">

<header>
  <a href="dashboard.html">
    <img src="https://i.postimg.cc/QCrwp4pC/Picsart-25-10-01-17-11-01-636.png">
  </a>
  <nav>
    <a href="index.html">Home</a>
    <a href="#">About</a>
    <a href="contact.html">Contact</a>
    <a href="login.html">Login</a>
    <a href="register.html">Register</a>
  </nav>
</header>

<div class="main-container">

  <div class="sidebar-wrapper">
    <a href="dashboard.html" class="sidebar-box active">
      <img src="https://i.postimg.cc/Dyp5hp80/dashboard.png"> Dashboard
    </a>
    <a href="bank.html" class="sidebar-box">
      <img src="https://i.postimg.cc/J06F91fn/arrows.png"> Transfer
    </a>
    <a href="card.html" class="sidebar-box">
      <img src="https://i.postimg.cc/h41c2ThY/debit-card.png"> Card
    </a>
    <a href="profile.html" class="sidebar-box">
      <img src="https://i.postimg.cc/0292vZLx/account.png"> Profile
    </a>
    <a href="logout.html" class="sidebar-box">
      <img src="https://i.postimg.cc/fycLKrpP/logout.png"> Logout
    </a>
  </div>

  <div class="dashboard-content">

    <div class="account-box">
      <h3>Account Details</h3>
      <p>Username: <span id="userNameDisplay"></span></p>
      <p>Account: <span id="accountNumberDisplay"></span></p>
    </div>

    <div class="send-box">
      <h3>Send Money</h3>

      <div class="transfer-icons">
        <a href="bank.html" class="icon">
          <img src="https://i.postimg.cc/4ytt1NLd/mobile-banking-1.png">
          <span>Bank</span>
        </a>
        <a href="wallet.html" class="icon">
          <img src="https://i.postimg.cc/G2Tscm1J/wallet-1.png">
          <span>Wallet</span>
        </a>
        <a href="atm.html" class="icon">
          <img src="https://i.postimg.cc/6Q97GhJk/atm-machine.png">
          <span>ATM</span>
        </a>
      </div>

      <select id="transactionType">
        <option value="">-- Choose Transaction --</option>
        <option value="withdrawal">Withdrawal</option>
        <option value="deposit">Deposit</option>
      </select>
  <div id="withdrawalSection" style="display: none;">

  <h3>Withdrawal Details</h3>

  <div class="form-group">
    <label>ATM Code</label>
    <input type="text" id="atmCode" placeholder="e.g. ATM-1023">
  </div>

  <div class="form-group">
    <label>PIN</label>
    <input type="password" id="pin" placeholder="Enter PIN">
  </div>

  <div class="form-group">
    <label>Amount</label>
    <input type="number" id="amount" placeholder="Enter Amount">
  </div>

  <button id="generateOtp" class="otp-btn">Generate OTP</button>
   
  <div id="atmMessage" class="atm-message"></div>
  <p id="otpTimer" style="margin-top:10px; font-weight:bold;"></p>
<button id="resendOtp" class="hidden resend-btn">Resend OTP</button>
<button id="goToAtmBtn">Go to ATM 🏧</button>
</div>

<script src="js/atm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
