     <main class="main">

  <section class="account-box">
    <div>
      <h3>Account Details</h3>
      <h3 username: id="userNameDisplay">User Name</h3>

  <section class="transfer-form">

    <div class="icon-bar">
      <a class="icon active" href="bank.html">
        <img src="https://i.postimg.cc/4ytt1NLd/mobile-banking-1.png" alt="Bank">

    <h4>Send Money</h4>

    <!-- STEP 1 -->
    <form id="step1">
   <select id="transferType" required>
<option value="">Select Transfer Type</option>
<option value="internal">Same Bank</option>
<option value="external">Other Bank</option>
</select>
<select id="bank" name="bank" style="display:none;">
  <option></option>

  <option value="banque misr" data-logo="https://zeed.tech/wp-content/uploads/2022/05/bank-misr.png">
    Banque Misr
  </option>

  <option value="national bank of egypt" data-logo="https://i.pinimg.com/474x/48/cd/53/48cd5306afa9161bef590f31a0b9458b.jpg">
    National Bank of Egypt
  </option>

  <option value="CIB" data-logo="https://images.seeklogo.com/logo-png/20/2/cib-logo-png_seeklogo-201249.png">
    CIB
  </option>

  <option value="QNB" data-logo="https://www.qnb.com/sites/qnb/qnbglobal/arSolidLogo-QNBSolidLogo.jpg">
    QNB
  </option>

  <option value="alex bank" data-logo="https://images.seeklogo.com/logo-png/45/2/alexbank-logo-png_seeklogo-453043.png">
    Alex Bank
  </option>

  <option value="hsbc" data-logo="https://www.hsbc.com.eg/etc.clientlibs/dpws/clientlibs-public/clientlib-site/resources/social/logo/Square-1200x1200px.jpg">
    HSBC
  </option>

  <option value="arab bank" data-logo="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d6/Arab_Bank.svg/960px-Arab_Bank.svg.png">
    Arab Bank
  </option>
  <option value="cairo bank" data-logo="https://images.seeklogo.com/logo-png/45/2/banque-du-caire-logo-png_seeklogo-451253.png">
    Banque du Cairo
  </option>
  <option value="housing bank" data-logo="https://upload.wikimedia.org/wikipedia/ar/f/f3/Hdb_bank_logo.jpg">
    Houssing & Deployment Bank
  </option>
   <option value="Arab African International Bank" data-logo="https://internationalbanker.com/wp-content/uploads/2014/04/Bank-Logo-3.png">
Arab African International Bank
  </option>
<option value="Emirates NBD Egypt" data-logo="https://cdn.emiratesnbd.com/plugins/mediacentre/images/main_images/egypt_abt_news_multiple_development_projects_270423.png">
Emirates NBD Egypt
  </option>
<option value="Abu Dhabi Islamic Bank Egypt" data-logo="https://adib.eg/media/1884298/adib-logoen-200x200.png">
Abu Dhabi Islamic Bank Egypt
  </option>
<option value="ABK" data-logo="https://upload.wikimedia.org/wikipedia/commons/thumb/5/52/ABK_Logo.svg/1280px-ABK_Logo.svg.png">
ABK_Al Ahli Bank of Kuwait Egypt  
</option>
<option value="Egyptian Arab Land Bank" data-logo="https://www.hotlinesegypt.com/wp-content/uploads/2019/05/Egyptian-Arab-Land-bank-19939-372x300.jpg">
Egyptian Arab Land Bank
</option>
<option value="Suez Canal Bank" data-logo="https://iconape.com/wp-content/files/vh/373149/svg/373149.png">
Suez Canal Bank
</option>
<option value="Mashreq Bank" data-logo="https://www.clipartmax.com/png/middle/70-709110_mashreq-bank-egypt.png">
Mashreq Bank
</option>








</select>
 <input type="text" id="benefName" placeholder="Beneficiary Name" required>
 <input type="number" id="benefAccount" placeholder="Account Number" required>
  <input type="number" id="amount" placeholder="Amount" required>
      <button type="submit">Next</button>
    </form>

    <!-- STEP 2 -->
    <form id="step2" class="step-2" style="display:none;">
      <h4>Confirm Transfer</h4>
      <div class="confirm-details"></div>

      <button type="button" id="backBtn">Back</button>
      <button type="button" id="nextToPwd">Next</button>
    </form>

  <!-- STEP 3 (PASSWORD CONFIRMATION) -->
<form id="stepPwd" class="step-pwd" style="display:none;">
  <h4>Enter Password to Confirm</h4>

  <input type="password" id="pwd" placeholder="Password" required>
  <input type="password" id="pwdConfirm" placeholder="Confirm Password" required>

  <div id="bankMessage" class="form-message"></div>

  <button type="button" id="pwdBack">Back</button>
  <button type="submit">Confirm Transfer</button>
</form>

<div id="successBox" style="display:none; text-align:center; padding:25px;">
  <h3 style="color:#0b6b4a;">Transfer Successful ✅</h3>
  <p>Your transaction has been completed.</p>

  <button onclick="goDashboard()" style="
      margin-top:15px;
      padding:12px 25px;
      background:#0b6b4a;
      color:white;
      border:none;
      border-radius:8px;
      cursor:pointer;
  ">
    Go to Dashboard
  </button>
</div>
