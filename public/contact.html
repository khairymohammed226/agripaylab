<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | CA Bank</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', Tahoma, sans-serif;
  background: url('https://www.firstbankeg.com/UserFiles/NewsSizes/1920/2023/09/24/17792.jpg?230924102238') center/cover no-repeat;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

/* ===== Card ===== */
.card {
  width: 900px;
  max-width: 100%;
  background: rgba(255,255,255,0.25);
  backdrop-filter: blur(20px);
  border-radius: 15px;
  border: 1px solid rgba(255,255,255,0.3);
  box-shadow: 0 8px 25px rgba(0,0,0,0.15);
  overflow: hidden;
  animation: fadeIn 1s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(30px);}
  to {opacity:1; transform:translateY(0);}
}

/* ===== Header ===== */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(234,248,240,0.6);
  padding: 16px 22px;
  animation: slideDown .8s ease;
}

@keyframes slideDown {
  from {opacity:0; transform:translateY(-20px);}
  to {opacity:1; transform:translateY(0);}
}

.header img {
  height: 50px;
  transition: transform .3s;
}
.header img:hover { transform: scale(1.1); }

.nav a {
  text-decoration: none;
  color: #064a31;
  font-weight: 600;
  margin-left: 18px;
  position: relative;
}

.nav a::after {
  content:'';
  position:absolute;
  bottom:-4px;
  left:0;
  width:0;
  height:2px;
  background:#0b6b4a;
  transition:.3s;
}
.nav a:hover::after { width:100%; }

/* ===== Layout ===== */
.body { display: flex; }

/* ===== Sidebar ===== */
.sidebar {
  width: 200px;
  background: rgba(247,251,249,0.6);
  border-right: 2px solid rgba(213,233,219,0.7);
  padding: 20px;
}

.sidebar .item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px;
  margin-bottom: 15px;
  border-radius: 8px;
  font-weight: 600;
  color: #0b6b4a;
  cursor: pointer;
  transition: .3s;
}

.sidebar .item img {
  width: 20px;
  height: 20px;
}

.sidebar .item:hover {
  background: rgba(223,242,230,0.7);
  transform: translateX(5px);
}
.sidebar a {
  text-decoration: none;
  color: #0b6b4a;
}

/* ===== Main ===== */
.main {
  flex: 1;
  padding: 30px;
  animation: fadeUp 1.2s ease;
}

@keyframes fadeUp {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1; transform:translateY(0);}
}

/* ===== Contact Box ===== */
.contact-box {
  background: rgba(255,255,255,0.85);
  border-radius: 15px;
  padding: 30px;
  border: 1px solid #cfe7d6;
  max-width: 600px;
}

.contact-box h2 {
  text-align: center;
  color: #064a31;
  margin-bottom: 20px;
}

/* ===== Form ===== */
form {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

label {
  font-weight: 600;
  color: #064a31;
}

input, textarea {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 1.8px solid #b8dbcb;
  font-size: 15px;
}

input:focus, textarea:focus {
  outline: none;
  border-color: #0b6b4a;
  box-shadow: 0 0 6px rgba(11,107,74,0.3);
}

textarea {
  resize: none;
  height: 110px;
}

button {
  width: 120px;
  padding: 10px;
  background: #0b6b4a;
  color: #fff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 700;
  align-self: center;
  transition: .3s;
}

button:hover {
  background: #097043;
  transform: scale(1.05);
}
.success-message {
  display: none;
  background: #d4edda;
  color: #155724;
  padding: 12px;
  border-radius: 8px;
  margin-top: 15px;
  text-align: center;
  font-weight: 600;
}

/* ===== Responsive ===== */
@media(max-width:720px){
  .body { flex-direction: column; }
  .sidebar {
    width:100%;
    display:flex;
    justify-content: space-around;
    border-right:none;
    border-bottom:2px solid rgba(213,233,219,0.7);
  }
}
</style>
</head>

<body>

<div class="card">

  <!-- Header -->
<header class="header">
  <img src="https://i.postimg.cc/QCrwp4pC/Picsart-25-10-01-17-11-01-636.png">

  <nav class="nav">
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="login.html">Login</a>
    <a href="register.html">Sign Up</a>
  </nav>
</header>


  <div class="body">

    <!-- Sidebar -->
<aside class="sidebar">

  <a href="dashboard.html" class="item">
    <img src="https://i.postimg.cc/Dyp5hp80/dashboard.png">
    Dashboard
  </a>

  <a href="bank.html" class="item">
    <img src="https://i.postimg.cc/J06F91fn/arrows.png">
    Transfer
  </a>

  <a href="card.html" class="item">
    <img src="https://i.postimg.cc/h41c2ThY/debit-card.png">
    Card
  </a>

  <a href="profile.html" class="item">
    <img src="https://i.postimg.cc/0292vZLx/account.png">
    Profile
  </a>

  <a href="login.html" class="item">
    <img src="https://i.postimg.cc/fycLKrpP/logout.png">
    Logout
  </a>

</aside>


    <!-- Main -->
    <main class="main">
      <div class="contact-box">
        <h2>Contact Us</h2>

<form>

  <label>Full Name</label>
  <input id="name" type="text" placeholder="Enter your name">

  <label>Phone Number</label>
  <input id="phone" type="text" placeholder="Enter your phone number">

  <label>Email</label>
  <input id="email" type="email" placeholder="Enter your email">

  <label>Message</label>
  <textarea id="message" placeholder="Write your message..."></textarea>

  <button type="submit">Send</button>

</form>


<div id="successMessage" class="success-message">
  send massee successfull
</div>

      </div>
    </main>

  </div>
</div>
<script>
document.querySelector("form").addEventListener("submit", async function(e) {
  e.preventDefault();

  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const email = document.getElementById("email").value;
  const message = document.getElementById("message").value;

  const res = await fetch(`/contact`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ name, phone, email, message })
  });

  const data = await res.json();
const msg = document.getElementById("successMessage");

msg.style.display = "block";

// إخفاء بعد 3 ثواني
setTimeout(() => {
  msg.style.display = "none";
}, 3000);

// تفريغ الفورم
document.querySelector("form").reset();

});
</script>
</body>
</html>
