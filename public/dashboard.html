<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="image/logo.png">
<link rel="apple-touch-icon" href="image/logo.png">
  <title>Bank Dashboard</title>
  <script>
  // 🔒 حماية الصفحة
  if (localStorage.getItem("isLoggedIn") !== "true") {
    window.location.href = "login.html";
  }
</script>

  
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<link rel="stylesheet" href="css/dashboard.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
  <div class="navbar">
    <div class="logo">
      <img src="image/Picsart_25-10-01_17-11-01-636.png" alt="logo">
    </div>
    <div class="links">
      <a href="index.html">HOME</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
      <a href="login.html">Login</a>
      <a href="register.html">Sign up</a>

    </div>
  </div>

  <div class="container">
    <div class="layout">

      <!-- Sidebar -->
      <div class="sidebar">
        <img src="image/Picsart_25-10-01_17-11-01-636.png" alt="logo" class="logo">
        <div class="menu">
          <a href="dashboard.html"><img src="image/layout.png" class="icon">DASHBOARD</a>
          <a href="bank.html"><img src="image/arrows.png" class="icon">TRANSFER</a>
          <a href="card.html"><img src="image/card.png" class="icon">CARD</a>
          <a href="profile.html"><img src="image/account.png" class="icon">PROFILE</a>
<a href="#" id="logoutBtn">
    <img src="image/logout.png" class="icon">LOG OUT
</a>
        </div>
      </div>

      <!-- Main content -->
      <div class="main">
        <div class="account-box">
          <h3>Account Number</h3>
          <div class="account-info">
            <p>
              <span id="fullname"></span>@ online bank <br>
              <span id="accountNumber"></span>
            </p>
            <img src="image/Picsart_25-10-01_17-11-01-636.png" alt="bank logo">
          </div>
          <h3>Balance</h3>
          <p><span id="balance"></span> EGP</p>
        </div>

        <div class="transactions">
          <h3>Transactions</h3>

          <div class="" id="transactionsList">
            <h3></h3>
          </div>
        </div>

      </div>
    </div> <!-- layout -->
  </div> <!-- container -->
<!-- Transaction Details Modal -->
<div id="transactionOverlay" class="transaction-overlay">

  <div class="transaction-modal">

    <div class="modal-header">
      <div class="modal-title">
        <i id="modalIcon" class="fa-solid fa-receipt"></i>
        <span>Transaction Details</span>
      </div>

      <i class="fa-solid fa-xmark close-btn" id="closeModal"></i>
    </div>

    <div class="modal-body">

      <div class="detail-row">
        <span>Amount</span>
        <strong id="modalAmount"></strong>
      </div>

      <div class="detail-row">
  <span>From</span>
  <div class="person">
    <strong id="modalFromName"></strong>
    <small id="modalFromNumber"></small>
  </div>
</div>

<div class="detail-row">
  <span>To</span>
  <div class="person">
    <strong id="modalToName"></strong>
    <small id="modalToNumber"></small>
  </div>
</div>

      <div class="detail-row">
        <span>type</span>
        <strong id="modalBank"></strong>
      </div>

      <div class="detail-row">
        <span>Date</span>
        <strong id="modalDate"></strong>
      </div>

      <div class="detail-row">
        <span>Status</span>
        <strong class="status-success">Successful</strong>
      </div>
    </div>
      <div class="modal-actions">

  <button class="action-btn" id="downloadReceipt">
    <i class="fa-solid fa-download"></i>
    Download Receipt
  </button>

  <button class="action-btn" id="shareReceipt">
    <i class="fa-solid fa-share-nodes"></i>
    Share
  </button>

</div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
