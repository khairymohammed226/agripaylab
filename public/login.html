<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Page</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/login.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

  <!-- ✅ Navbar -->
  <div class="top-nav">
    <div class="logo">
      <a href="home.html"> 
           <img src="image/Picsart_25-10-01_17-11-01-636.png" alt="Logo">
      </a>
    </div>
    <ul>
        <li><a href="home.html">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="contact.html">Contact</a></li>
    <li><a href="login.html">Login</a></li>
      <li><a href="register.html" style="text-decoration:none; color:#083c24;">Sign up</a></li>
    </ul>
  </div>






  <!-- ✅ Login Box -->
 <div class="login-box">
  <h2>Login</h2>

  <form id="loginForm">
    <div class="input-group">
      <img src="image/account.png" alt="User Icon" class="icon">
      <input type="text" id="username" placeholder="username" required>
    </div>

    <div class="input-group">
      <img src="image/padlock.png" alt="Lock Icon" class="icon">
      <input type="password" id="password" placeholder="Password" required>
      <span class="toggle" onclick="togglePassword()">
  <i id="eyeIcon" class="fa-solid fa-eye"></i>
</span>

    </div>

    <button type="submit" class="login-btn">Login</button>

    <div id="loginMessage" class="form-message"></div>
    <div class="register">
      New user? <a href="register.html">Register now</a>
    </div>
  </form>
</div>


<script src="js/login.js"></script>
</body>
</html>
