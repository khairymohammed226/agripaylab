<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Page</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: url('https://images.unsplash.com/photo-1521791136064-7986c2920216') center/cover no-repeat;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
    }

    /* ✅ Navbar */
    .top-nav {
      width: 90%;
      background-color: rgba(213, 232, 212, 0.4);
      margin: 20px auto 0;
      border-radius: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 50px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
      backdrop-filter: blur(6px);
      z-index: 1000;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
    }

    .top-nav .logo img {
      height: 50px;
      width: auto;
    }

    .top-nav ul {
      list-style: none;
      display: flex;
      gap: 45px;
      margin: 0;
    }

    .top-nav ul li {
      cursor: pointer;
      font-weight: 700;
      transition: 0.3s;
      color: #083c24;
      font-size: 17px;
      letter-spacing: 1px;
    }

    .top-nav ul li:hover {
      color: #2f8a64;
      transform: scale(1.05);
    }

    /* ✅ Login Box */
    .login-box {
      background: rgba(255, 255, 255, 0.2);
      padding: 60px 50px;
      border-radius: 20px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.25);
      width: 600px;
      max-width: 90%;
      text-align: center;
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      margin-top: 180px;
    }

    .login-box h2 {
      margin-bottom: 30px;
      font-size: 30px;
      text-transform: lowercase;
      color: #083c24;
    }

    .input-group {
      position: relative;
      margin-bottom: 25px;
    }

    .input-group .icon {
      position: absolute;
      top: 50%;
      left: 15px;
      transform: translateY(-50%);
      width: 25px;
      height: 25px;
      object-fit: contain;
      opacity: 0.8;
      pointer-events: none;
    }

    .input-group input {
      width: 100%;
      padding: 18px 50px;
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 8px;
      outline: none;
      font-size: 18px;
      transition: 0.3s;
      background-color: rgba(255,255,255,0.25);
      color: #000;
    }

    .input-group input:focus {
      border-color: #0B7C2C;
      box-shadow: 0 0 8px #0B7C2C33;
      background-color: rgba(255, 255, 255, 0.4);
    }

    .toggle {
      position: absolute;
      top: 50%;
      right: 15px;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 22px;
    }

    .login-btn {
      width: 100%;
      padding: 18px;
      border: none;
      background: rgba(255, 255, 255, 0.3);
      color: #083c24;
      font-size: 24px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .login-btn:hover {
      background: rgba(11, 124, 44, 0.8);
      color: #fff;
    }

    .register {
      margin-top: 25px;
      font-size: 22px;
      color: #000;
    }

    .register a {
      color: #000;
      text-decoration: none;
      font-weight: 500;
    }

    .register a:hover {
      text-decoration: underline;
    }
    .logo img {
  width: 80px; /* أو المقاس اللي يناسبك */
  transition: transform 0.5s ease, filter 0.5s ease;
  cursor: pointer;
}

/* لما تقف على اللوجو */
.logo img:hover {
  transform: rotate(10deg) scale(1.1);
  filter: brightness(1.2);
}
.top-nav ul li a {
  color: black !important; /* يخلي اللون أسود دايمًا */
  text-decoration: none;
  font-weight: bold;
  transition: transform 0.3s ease;
}

.top-nav ul li a:hover {
  transform: scale(1.1);
  color: black !important; /* حتى في hover يفضل أسود */
}

/* زر sign up */
.signup {
  background-color: transparent;
  color: black !important;
  border: 2px solid black;
  padding: 6px 12px;
  border-radius: 10px;
  transition: all 0.3s ease;
}

.signup:hover {
  background-color: black;
  color: white !important;
}
/* ===== Login Message ===== */
.form-message {
  display: none;
  margin-top: 15px;
  padding: 12px;
  border-radius: 10px;
  font-weight: bold;
  text-align: center;
  font-size: 14px;
  width: 100%;
  transition: opacity 0.4s ease, transform 0.4s ease;
}

.form-message.success {
  background-color: #d4edda;
  color: #155724;
  border: 1px solid #c3e6cb;
}

.form-message.error {
  background-color: #f8d7da;
  color: #721c24;
  border: 1px solid #f5c6cb;
}


  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>

  <!-- ✅ Navbar -->
  <div class="top-nav">
    <div class="logo">
      <a href="home.html"> 
           <img src="image/Picsart_25-10-01_17-11-01-636.png" alt="Logo">
      </a>
    </div>
    <ul>
        <li><a href="home.html">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="contact.html">Contact</a></li>
    <li><a href="login.html">Login</a></li>
      <li><a href="register.html" style="text-decoration:none; color:#083c24;">Sign up</a></li>
    </ul>
  </div>






  <!-- ✅ Login Box -->
 <div class="login-box">
  <h2>Login</h2>

  <form id="loginForm">
    <div class="input-group">
      <img src="image/account.png" alt="User Icon" class="icon">
      <input type="text" id="username" placeholder="username" required>
    </div>

    <div class="input-group">
      <img src="image/padlock.png" alt="Lock Icon" class="icon">
      <input type="password" id="password" placeholder="Password" required>
      <span class="toggle" onclick="togglePassword()">
  <i id="eyeIcon" class="fa-solid fa-eye"></i>
</span>

    </div>

    <button type="submit" class="login-btn">Login</button>

    <div id="loginMessage" class="form-message"></div>
    <div class="register">
      New user? <a href="register.html">Register now</a>
    </div>
  </form>
</div>




<script>
function togglePassword() {
  const passwordInput = document.getElementById("password");

  if (!passwordInput) return;

  if (passwordInput.type === "password") {
    passwordInput.type = "text";
  } else {
    passwordInput.type = "password";
  }
}


document.addEventListener("DOMContentLoaded", () => {
  const form = document.getElementById("loginForm");
  if (!form) return;

  function showLoginMessage(text, type) {
  const msg = document.getElementById("loginMessage");

  msg.textContent = text;
  msg.className = "form-message " + type;
  msg.style.display = "block";

  if (type === "error") {
    setTimeout(() => {
      msg.style.display = "none";
    }, 6000);
  }
}

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const usernameInput = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!usernameInput || !password) {
      alert("please fill all fields");
      return;
    }

    try {
      const response = await fetch("http://localhost:3000/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
       body: JSON.stringify({ username: usernameInput, password }),

      });

      const data = await response.json();

      if (!response.ok) {
        showLoginMessage(data.message || "Username or password is incorrect", "error");
        return;
      }

      // حفظ البيانات بالـ fullname للعرض في الداش
const userData = {
  _id: data.user._id,
  firstName: data.user.firstName,
  lastName: data.user.lastName,
  username: data.user.username, 
  email: data.user.email,
  phone: data.user.phone,
  nationalId: data.user.nationalId,
  dob: data.user.dob,        // ✅
  balance: data.user.balance ?? 0
};


      localStorage.setItem("token", data.token);
      localStorage.setItem("currentUser", JSON.stringify(userData));

     showLoginMessage("Login successful", "success");
      window.location.href = "dashboard.html";

    } catch (err) {
      console.error("Fetch error:", err);
      showLoginMessage("Server error. Please try again later.", "error");
    }
  });
});
function togglePassword() {
  const passwordInput = document.getElementById("password");
  const eyeIcon = document.getElementById("eyeIcon");

  if (!passwordInput) return;

  if (passwordInput.type === "password") {
    passwordInput.type = "text";
    eyeIcon.classList.remove("fa-eye");
    eyeIcon.classList.add("fa-eye-slash");
  } else {
    passwordInput.type = "password";
    eyeIcon.classList.remove("fa-eye-slash");
    eyeIcon.classList.add("fa-eye");
  }
}

</script>







</body>
</html>
