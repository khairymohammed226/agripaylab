<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile | CA Bank</title>
  <link rel="icon" type="image/png" href="image/logo.png">
<link rel="apple-touch-icon" href="image/logo.png">
<script>
  if (sessionStorage.getItem("isLoggedIn") !== "true") {
    window.location.href = "login.html";
  }
</script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', Tahoma, sans-serif;
  background: url('https://www.firstbankeg.com/UserFiles/NewsSizes/1920/2023/09/24/17792.jpg?230924102238') center/cover no-repeat;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

/* Card */
.card {
  width: 900px;
  background: rgba(255,255,255,0.25);
  backdrop-filter: blur(20px);
  border-radius: 15px;
  border: 1px solid rgba(255,255,255,0.3);
  box-shadow: 0 8px 25px rgba(0,0,0,0.15);
  overflow: hidden;
  animation: fadeIn 1s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(30px);}
  to {opacity:1; transform:translateY(0);}
}

/* Header */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(234,248,240,0.6);
  padding: 16px 22px;
}

.header img {
  height: 50px;
  transition: .3s;
}
.header img:hover { transform: scale(1.1); }

.nav a {
  text-decoration: none;
  color: #064a31;
  font-weight: 600;
  margin-left: 18px;
  position: relative;
}
.nav a::after {
  content:'';
  position:absolute;
  bottom:-4px;
  left:0;
  width:0;
  height:2px;
  background:#0b6b4a;
  transition:.3s;
}
.nav a:hover::after { width:100%; }

/* Layout */
.body { display: flex; }

/* Sidebar */
.sidebar {
  width: 200px;
  background: rgba(247,251,249,0.6);
  border-right: 2px solid rgba(213,233,219,0.7);
  padding: 20px;
}

.sidebar .item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px;
  margin-bottom: 15px;
  border-radius: 8px;
  font-weight: 600;
  color: #0b6b4a;
  cursor: pointer;
  transition: .3s;
}

.sidebar .item a {
  text-decoration: none; 
  color: inherit;         
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
}

.sidebar .item img {
  width: 20px;
  height: 20px;
}

.sidebar .item:hover {
  background: rgba(223,242,230,0.7);
  transform: translateX(5px);
}

.sidebar .item.active {
  background: rgba(11,107,74,0.12);
  box-shadow: 0 0 10px rgba(11,107,74,0.25);
}

/* Main */
.main {
  flex: 1;
  padding: 30px;
}

/* Profile Box */
.profile-box {
  background: rgba(255,255,255,0.85);
  border-radius: 15px;
  padding: 25px;
  border: 1px solid #cfe7d6;
}

.profile-box h3 {
  margin-bottom: 20px;
  color: #064a31;
}

/* Form */
label {
  font-weight: 600;
  color: #064a31;
}

input {
  width: 100%;
  padding: 10px;
  margin: 6px 0 14px;
  border-radius: 8px;
  border: 1.8px solid #b8dbcb;
}

input:focus {
  outline: none;
  border-color: #0b6b4a;
  box-shadow: 0 0 6px rgba(11,107,74,0.3);
}

button {
  padding: 10px 16px;
  background: #0b6b4a;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 700;
  margin-right: 10px;
  transition: .3s;
}

button:hover {
  background: #097043;
  transform: scale(1.05);
}

/* Responsive */
@media(max-width:720px){
  .body { flex-direction: column; }
  .sidebar {
    width:100%;
    display:flex;
    justify-content: space-around;
    border-right:none;
    border-bottom:2px solid rgba(213,233,219,0.7);
  }
}
.profile-row {
  display: flex;
  justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid #e1e1e1;
}

.profile-row:last-child {
  border-bottom: none;
}

.profile-row .label {
  font-weight: 600;
  color: #064a31;
}

.profile-row .value {
  color: #333;
}
.form-message {
  display: none;
  margin-top: 15px;
  padding: 12px;
  border-radius: 10px;
  font-size: 14px;
  text-align: center;
  font-weight: bold;
  transition: 0.3s ease;
}

.form-message.success {
  background: #d4edda;
  color: #155724;
  border: 1px solid #c3e6cb;
}

.form-message.error {
  background: #f8d7da;
  color: #721c24;
  border: 1px solid #f5c6cb;
}
@media (max-width: 768px) {
  body {
    padding: 10px;
  }

  .card {
    width: 100%;
    border-radius: 10px;
  }

  .header {
    flex-direction: column;
    gap: 12px;
    padding: 15px;
  }

  .nav {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
  }

  .nav a {
    margin-left: 0;
    font-size: 14px;
  }

  .body {
    flex-direction: column;
  }

  .sidebar {
    width: 100%;
    display: flex;
    overflow-x: auto;
    border-right: none;
    border-bottom: 2px solid rgba(213,233,219,0.7);
    padding: 10px;
    white-space: nowrap;
  }

  .sidebar a, .side-item, .item {
    margin-bottom: 0;
    margin-right: 15px;
    flex-shrink: 0;
  }

  
  .main-content {
    padding: 15px 10px;
    width: 100%;
  }

  .profile-row {
    flex-direction: column;
    align-items: flex-start;
    gap: 8px;
  }

  
  .profile-row input.edit-input,
  #passwordBox input {
    width: 100%;
    margin-top: 5px;
  }

  button {
    width: 100%;
    margin-bottom: 10px;
  }
}

</style>
</head>

<body>

<div class="card">

  <!-- Header -->
  <header class="header">
    <img src="https://i.postimg.cc/QCrwp4pC/Picsart-25-10-01-17-11-01-636.png">
    <nav class="nav">
      <a href="#">About</a>
      <a href="contact.html">Contact</a>
      <a href="login.html">Login</a>
      <a href="register.html">Sign Up</a>
    </nav>
  </header>
<div class="body">

  <!-- Sidebar -->
  <aside class="sidebar">

    <div class="item">
      <a href="dashboard.html">
        <img src="https://i.postimg.cc/Dyp5hp80/dashboard.png">
        Dashboard
      </a>
    </div>

    <div class="item">
      <a href="bank.html">
        <img src="https://i.postimg.cc/J06F91fn/arrows.png">
        Transfer
      </a>
    </div>

    <div class="item">
      <a href="card.html">
        <img src="https://i.postimg.cc/h41c2ThY/debit-card.png">
        Card
      </a>
    </div>

    <div class="item active">
      <a href="profile.html">
        <img src="https://i.postimg.cc/0292vZLx/account.png">
        Profile
      </a>
    </div>

    <div class="item">

      </a>
    </div>

  </aside>

    <!-- Main -->
    <main class="main">
      <div class="profile-box">
        <h3>Profile</h3>

<div class="profile-row">
  <span class="label">First Name</span>
  <span class="value" id="firstName"></span>
   <input class="edit-input" id="firstNameInput" style="display:none;">
</div>

<div class="profile-row">
  <span class="label">Last Name</span>
  <span class="value" id="lastName"></span>
<input class="edit-input" id="lastNameInput" style="display:none;">
</div>

<div class="profile-row">
  <span class="label">National ID</span>
  <span class="value" id="nationalId"></span>
</div>

<div class="profile-row">
  <span class="label">Email</span>
  <span class="value" id="email"></span>
     <input class="edit-input" id="emailInput" style="display:none;">

</div>

<div class="profile-row">
  <span class="label">Phone</span>
  <span class="value" id="phone"></span>
       <input class="edit-input" id="phoneInput" style="display:none;">

</div>

<div class="profile-row">
  <span class="label">Date of Birth</span>
  <span class="value" id="dob"></span>
</div>


<button id="editBtn">Edit information</button>
<button id="saveBtn" style="display:none;">Save</button>

<button id="changePassBtn">Change password</button>

<div id="passwordBox" style="display:none;">
  <input id="oldPass" type="password" placeholder="Old password">
  <input id="newPass" type="password" placeholder="New password">
  <input id="confirmPass" type="password" placeholder="Confirm password">
  <button id="savePassBtn">Save Password</button>
 <button type="button" id="cancelBtn">Cancel</button>
  <div id="profileMessage" class="form-message"></div>
</div>


</div>
        </form>
      </div>
    </main>

  </div>
</div>
</div>


<script src="js/profile.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
