<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>👤 Create Account - Crédit Agricole</title>
 <link rel="stylesheet" href="css/regester.css">
 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

  <!-- Navbar -->
  <div class="top-nav">
    <div class="logo">
        <img src="image/Picsart_25-10-01_17-11-01-636.png" alt="Logo">
    </div>
    <ul>
      <li><a href="home.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
     <li><a href="login.html" id="loginLink">Login</a></li>
<li><a href="register.html" id="signupLink" class="signup">Sign Up </a></li>
    </ul>
  </div>

  <!-- Main -->
<div class="container d-flex justify-content-center align-items-center">
    <div class="form-container">

      <div id="errorBox"></div>

      <form id="registerForm" novalidate>

        <h2>Create Your Account</h2>

        <!-- Step 1 -->
        <div class="step">
<input type="text" id="firstname" class="form-control mb-3" placeholder="First Name" required>
<input type="text" id="lastname" class="form-control mb-3" placeholder="Last Name" required>
<input type="text" id="username" class="form-control mb-3" placeholder="Username" required>

<button type="button" class="nextBtn btn btn-success w-100">Next</button>
        </div>

        <!-- Step 2 -->
 <!-- Step 2 -->
<div class="step" style="display:none">

  <input 
    type="text"
    id="nationalId"
    class="form-control mb-3"
    placeholder="National id"
    maxlength="14"
    required
  >

  <div class="buttons">
    <button type="button" class="backBtn btn btn-secondary">
      Back
    </button>

    <button type="button" class="nextBtn btn btn-success">
      Next
    </button>
  </div>

</div> <!-- ✅ ده كان ناقص -->

<!-- Step 3 -->
<div class="step" style="display:none">

  <input type="email" id="email" class="form-control mb-3" placeholder="Email" required>
  <span class="error-text" id="emailError"></span>

  <input type="text" id="phonenumber" class="form-control mb-3" placeholder="Phone Number" required>
  <span class="error-text" id="phoneError"></span>

  <div class="buttons">
    <button type="button" class="backBtn btn btn-secondary">Back</button>
    <button type="button" class="nextBtn btn btn-success">Next</button>
  </div>

</div>

 <!-- Step 4 -->
<!-- Step 4 -->
<div class="step" style="display:none">

  <input 
    type="password" 
    id="password" 
    class="form-control mb-3" 
    placeholder="Password" 
    required
  >

  <div id="passwordSuggestion" class="text-success mb-2"></div>

  <input 
    type="password" 
    id="confirmPassword" 
    class="form-control mb-3" 
    placeholder="Confirm Password" 
    required
  >

  <div class="buttons">
    <button type="button" class="backBtn btn btn-secondary">
      Back
    </button>

    <button type="button" class="nextBtn btn btn-success">
      Next
    </button>
  </div>

</div>

        <!-- Step 5 -->
 <!-- Step 5 -->
<div class="step" style="display:none">

  <input 
    type="date" 
    id="dob" 
    class="form-control mb-3" 
    required
  >

  <div class="buttons">
    <button type="button" class="backBtn btn btn-secondary">
      Back
    </button>

    <button type="submit" class="btn btn-success">
      Register
    </button>
  </div>

</div>
<button
  type="button"
  id="addCardBtn"
  class="btn"
  style="display:none; margin-top:10px; background:#0b5134;"
>
  Add Card
</button>

<button
  type="button"
  id="skipCardBtn"
  class="btn"
  style="display:none; margin-top:10px; background:#999;"
>
  Skip for now
</button>


        <div class="checkbox">
          <input type="checkbox" required>
          I agree to the <a href="#">Terms & Conditions</a>
        </div>

        <div class="login">
          Already have an account? <a href="login.html">Log In</a>
        </div>
        <div id="registerMessage" class="message"></div>
      </form>
    </div>
  </div>

<script src="js/auth.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
