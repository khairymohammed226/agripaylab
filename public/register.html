<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>👤 Create Account - Crédit Agricole</title>
 <link rel="stylesheet" href="css/regester.css">
</head>

<body>

  <!-- Navbar -->
  <div class="top-nav">
    <div class="logo">
      <img src="image/Logo.png" alt="Logo">
    </div>
    <ul>
      <li><a href="home.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
     <li><a href="login.html" id="loginLink">Login</a></li>
<li><a href="register.html" id="signupLink" class="signup">Sign Up</a></li>
    </ul>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="form-container">

      <div id="errorBox"></div>

      <form id="registerForm" novalidate>

        <h2>Create Your Account</h2>

        <!-- Step 1 -->
        <div class="step">
          <input type="text" id="firstname" placeholder="First Name" required>
          <input type="text" id="lastname" placeholder="Last Name" required>
          <input type="text" id="username" placeholder="Username" required>
          <button type="button" class="nextBtn">Next</button>
        </div>

        <!-- Step 2 -->
        <div class="step" style="display:none">
         <input 
  type="text"
  id="nationalId"
  placeholder="National id"
  maxlength="14"
  inputmode="numeric"
  pattern="\d{14}"
  required
>
          <div class="buttons">
  <button type="button" class="backBtn">Back</button>
  <button type="button" class="nextBtn">Next</button>
</div>
        </div>

        <!-- Step 3 -->
        <div class="step" style="display:none">
          <input type="email" id="email" placeholder="Email" required>
          <span class="error-text" id="emailError"></span>
         <input type="text" id="phonenumber" placeholder="Phone Number" required>
         <span class="error-text" id="phoneError"></span>
          <div class="buttons">
  <button type="button" class="backBtn">Back</button>
  <button type="button" class="nextBtn">Next</button>
</div>
        </div>

        <!-- Step 4 -->
        <div class="step" style="display:none">
          <div class="password-container">
  <input type="password" id="password" placeholder="Password" required>
  <span id="togglePassword">👁️</span>
</div>
        <div class="password-container">
  <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
  <span id="toggleConfirm">👁️</span>
</div>
            <div class="password-strength">
  <div id="strengthBar"></div>
</div>
  <button type="button" class="backBtn">Back</button>
  <button type="button" class="nextBtn">Next</button>
</div>
        </div>

        <!-- Step 5 -->
        <div class="step" style="display:none">
          <input type="date" id="dob" required>
          <div class="buttons">
  <button type="button" class="backBtn">Back</button>
  <button type="submit" class="btn">Register</button>
</div>
        </div>
<button
  type="button"
  id="addCardBtn"
  class="btn"
  style="display:none; margin-top:10px; background:#0b5134;"
>
  Add Card
</button>

<button
  type="button"
  id="skipCardBtn"
  class="btn"
  style="display:none; margin-top:10px; background:#999;"
>
  Skip for now
</button>


        <div class="checkbox">
          <input type="checkbox" required>
          I agree to the <a href="#">Terms & Conditions</a>
        </div>

        <div class="login">
          Already have an account? <a href="login.html">Log In</a>
        </div>
        <div id="registerMessage" class="message"></div>
      </form>
    </div>
  </div>

<script src="js/auth.js"></script>


</body>
</html>
