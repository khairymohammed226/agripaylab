<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Email Verification</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
     background: linear-gradient(135deg, #0b2e2b, #004d40, #00796b);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      border-radius: 20px;
      padding: 30px;
      text-align: center;
      color: white;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* 🔥 اللوجو */
    .logo {
      margin-bottom: 15px;
    }

    .logo img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      padding: 8px;
      background: white;
      object-fit: contain;
      box-shadow: 0 0 20px rgba(0,255,200,0.4);
    }

    h2 {
      margin: 10px 0;
    }

    .subtitle {
      font-size: 14px;
      opacity: 0.8;
      margin-bottom: 20px;
    }

    .email {
      font-size: 13px;
      margin-bottom: 20px;
      opacity: 0.7;
    }

    .otp-box {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .otp-box input {
      width: 45px;
      height: 55px;
      text-align: center;
      font-size: 20px;
      border-radius: 10px;
      border: none;
      outline: none;
      background: rgba(255,255,255,0.2);
      color: white;
      transition: 0.2s;
    }

    .otp-box input:focus {
      background: rgba(255,255,255,0.4);
      transform: scale(1.1);
    }

    .verify-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #00c896, #00966c);      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .verify-btn:hover {
      background: #00a87a;
    }

    .verify-btn.loading {
      opacity: 0.7;
      pointer-events: none;
    }

    .resend {
      margin-top: 15px;
      font-size: 13px;
    }

.resend span {
  color: #00c896;
  cursor: pointer;
  transition: 0.2s;
}

.resend span:hover {
  opacity: 0.8;
  text-decoration: underline;
}


    .timer {
      margin-top: 10px;
      font-size: 12px;
      opacity: 0.6;
    }

    .message {
      margin-top: 15px;
      font-size: 14px;
    }

    .success {
      color: #00ffcc;
    }

    .error {
      color: #ff6b6b;
    }

  </style>
</head>

<body>

<div class="container">
  <div class="card">

    <!-- 🔥 هنا اللوجو -->
     <div class="logo">
      <img src="image/logomain.png" alt="Bank Logo">
    </div> 

    <h2>Email Verification</h2>

    <p class="subtitle">Enter the 6-digit code sent to your email</p>

    <div class="email" id="userEmail"></div>

    <div class="otp-box">
      <input type="text" maxlength="1">
      <input type="text" maxlength="1">
      <input type="text" maxlength="1">
      <input type="text" maxlength="1">
      <input type="text" maxlength="1">
      <input type="text" maxlength="1">
    </div>

<button id="verifyBtn" class="verify-btn">Verify</button>
    <div class="timer">Resend available in <span id="countdown">30</span>s</div>

    <p class="resend">
      Didn't receive code?
      <span id="resendBtn" style="opacity:0.5; pointer-events:none;">
  Resend
</span>
    </p>
    
<p class="resend" style="margin-top:10px;">
  Wrong email?
  <span id="changeEmailBtn">
    Change Email
  </span>
</p>


    <div id="message" class="message"></div>

  </div>
</div>

<script>
const otpInputs = document.querySelectorAll(".otp-box input");

otpInputs.forEach((input, index) => {
input.addEventListener("input", () => {

  input.value = input.value.replace(/\D/g, "");

  if (input.value.length === 1 && index < otpInputs.length - 1) {
    otpInputs[index + 1].focus();
  }

});


  input.addEventListener("keydown", (e) => {
    if (e.key === "Backspace" && input.value === "" && index > 0) {
      otpInputs[index - 1].focus();
    }
  });
});
otpInputs[0].addEventListener("paste", (e) => {

  e.preventDefault();

  const pastedData = e.clipboardData.getData("text")
    .replace(/\D/g, "")
    .slice(0, 6);

  pastedData.split("").forEach((char, index) => {
    if (otpInputs[index]) {
      otpInputs[index].value = char;
    }
  });
  otpInputs[Math.min(pastedData.length - 1, 5)].focus();

});

/* ===== Email Mask ===== */

const savedEmail = sessionStorage.getItem("userEmail");



document.getElementById("userEmail").textContent =
  savedEmail || "No Email";




/* ===== Countdown ===== */

let timeLeft = 30;

const countdownEl = document.getElementById("countdown");
const resendBtn = document.getElementById("resendBtn");

function startCountdown(){

  resendBtn.style.pointerEvents = "none";
  resendBtn.style.opacity = "0.5";

  timeLeft = 30;
  countdownEl.textContent = timeLeft;

  const timer = setInterval(() => {

    timeLeft--;

    countdownEl.textContent = timeLeft;

    if(timeLeft <= 0){

      clearInterval(timer);

      countdownEl.textContent = "0";

      resendBtn.style.pointerEvents = "auto";
      resendBtn.style.opacity = "1";
    }

  }, 1000);
}

startCountdown();


/* ===== Resend OTP ===== */

resendBtn.addEventListener("click", async () => {

  const userId = sessionStorage.getItem("verifyUserId");

  try {

    resendBtn.style.pointerEvents = "none";
    resendBtn.style.opacity = "0.5";

    const res = await fetch("https://www.agripaylab.online/resend-otp", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ userId })
    });

    const data = await res.json();

    if(!res.ok){
      alert(data.message || "Failed to resend code");
      return;
    }

    startCountdown();

  } catch(err){

    alert("Server error");

    resendBtn.style.pointerEvents = "auto";
    resendBtn.style.opacity = "1";
  }

});

document.getElementById("verifyBtn").addEventListener("click", async () => {

  const inputs = document.querySelectorAll(".otp-box input");
  const otp = Array.from(inputs).map(input => input.value).join("");

  const userId = sessionStorage.getItem("verifyUserId");
  const msg = document.getElementById("message");

  if (otp.length < 6) {
    msg.textContent = "Please enter full code";
    msg.style.color = "red";
    return;
  }

  const btn = document.getElementById("verifyBtn");

  btn.disabled = true;
  btn.textContent = "Verifying...";

  try {
    const res = await fetch("https://www.agripaylab.online/verify-email", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ userId, otp })
    });

    const data = await res.json();

    if (!res.ok) {
      msg.textContent = data.message;
      msg.style.color = "red";

      btn.disabled = false;
      btn.textContent = "Verify";
      return;
    }

    msg.textContent = "Verified successfully ✅";
    msg.style.color = "green";
sessionStorage.setItem("verified", "true");

     sessionStorage.setItem("currentUser", JSON.stringify({
  _id: userId
}));
sessionStorage.setItem("isLoggedIn", "true");

 setTimeout(() => {
  window.location.href = "register.html";
}, 1500);

  } catch (err) {
    msg.textContent = "Server error";
    msg.style.color = "red";

    btn.disabled = false;
    btn.textContent = "Verify";
  }

});

/* ===== Change Email ===== */

document.getElementById("changeEmailBtn")
.addEventListener("click", async () => {

  const userId = sessionStorage.getItem("verifyUserId");

  try {

    await fetch(`https://www.agripaylab.online/delete-unverified-user/${userId}`, {
      method: "DELETE"
    });

  } catch(err) {
    console.log("Delete failed");
  }

  // مسح الـ session
  sessionStorage.removeItem("verifyUserId");
  sessionStorage.removeItem("userEmail");
  sessionStorage.removeItem("verified");
  sessionStorage.removeItem("currentUser");
  sessionStorage.removeItem("isLoggedIn");

  window.location.href = "register.html";

});


</script>
<script src="js/transitions.js"></script>
</body>
</html>
