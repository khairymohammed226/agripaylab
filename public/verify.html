<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Email Verification</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
.vpage{
  min-height:500px;
  display:flex;align-items:center;
  justify-content:center;
  padding:2rem 1rem;
  background:linear-gradient(135deg,#0b2e2b,#004d40,#00796b);
  border-radius:var(--border-radius-lg)
}
.vcard{
  width:100%;
  max-width:400px;
  background:rgba(255,255,255,0.12);
  border:0.5px solid rgba(255,255,255,0.25);
  border-radius:20px;padding:2rem 1.75rem;
  text-align:center;
  color:#fff
}
.vlogo{
  width:72px;
  height:72px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;box-shadow:0 0 0 6px rgba(255,255,255,0.15)}
.vlogo i{font-size:32px;color:#0b6b4a}
.vtitle{font-size:20px;font-weight:500;margin:0 0 6px;color:#fff}
.vsub{font-size:13px;color:rgba(255,255,255,0.7);margin:0 0 8px}
.vemail{font-size:13px;color:rgba(255,255,255,0.55);margin:0 0 1.5rem;font-style:italic}
.otp-row{display:flex;justify-content:center;gap:10px;margin-bottom:1.5rem}
.otp-row input{width:44px;height:54px;text-align:center;font-size:22px;font-weight:500;border-radius:10px;border:1.5px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.15);color:#fff;outline:none;transition:.2s;caret-color:#00c896}
.otp-row input:focus{background:rgba(255,255,255,0.28);border-color:#00c896;transform:scale(1.06)}
.otp-row input.filled{border-color:rgba(0,200,150,0.7);background:rgba(0,200,150,0.15)}
.vbtn{width:100%;padding:13px;border:none;border-radius:10px;background:#00c896;color:#fff;font-size:15px;font-weight:500;cursor:pointer;transition:.25s;letter-spacing:.3px}
.vbtn:hover{background:#00a87a;transform:translateY(-1px)}
.vbtn:active{transform:scale(0.98)}
.vbtn:disabled{opacity:.55;cursor:not-allowed;transform:none}
.vtimer{font-size:12px;color:rgba(255,255,255,0.5);margin:.9rem 0 .5rem}
.vtimer span{color:#00c896;font-weight:500}
.vresend{font-size:13px;color:rgba(255,255,255,0.65);margin:.3rem 0}
.vresend button{background:none;border:none;color:#00c896;cursor:pointer;font-size:13px;font-weight:500;padding:0;transition:.2s}
.vresend button:hover{opacity:.75;text-decoration:underline}
.vresend button:disabled{color:rgba(255,255,255,0.35);cursor:not-allowed;text-decoration:none}
.vmsg{margin-top:1rem;font-size:13px;padding:10px 14px;border-radius:8px;display:none}
.vmsg.ok{background:rgba(0,255,200,0.12);border:0.5px solid rgba(0,200,150,0.4);color:#00ffcc}
.vmsg.err{background:rgba(255,100,100,0.12);border:0.5px solid rgba(255,80,80,0.4);color:#ff8888}
.vdivider{border:none;border-top:0.5px solid rgba(255,255,255,0.12);margin:1.1rem 0}
.vchange{font-size:12px;color:rgba(255,255,255,0.5)}
.vchange button{background:none;border:none;color:rgba(255,255,255,0.65);cursor:pointer;font-size:12px;padding:0;text-decoration:underline}
.vchange button:hover{color:#fff}
@media(max-width:480px){.otp-row input{width:38px;height:48px;font-size:19px}.vcard{padding:1.5rem 1.1rem}}
</style>

<div class="vpage">
  <div class="vcard" role="main">
    <h2 class="sr-only">Email verification</h2>

    <div class="vlogo" aria-hidden="true">
      <i class="ti ti-mail-check"></i>
    </div>

    <p class="vtitle">Verify your email</p>
    <p class="vsub">Enter the 6-digit code sent to</p>
    <p class="vemail" id="userEmail">user@example.com</p>

    <div class="otp-row" role="group" aria-label="One-time code">
      <input type="text" inputmode="numeric" maxlength="1" aria-label="Digit 1">
      <input type="text" inputmode="numeric" maxlength="1" aria-label="Digit 2">
      <input type="text" inputmode="numeric" maxlength="1" aria-label="Digit 3">
      <input type="text" inputmode="numeric" maxlength="1" aria-label="Digit 4">
      <input type="text" inputmode="numeric" maxlength="1" aria-label="Digit 5">
      <input type="text" inputmode="numeric" maxlength="1" aria-label="Digit 6">
    </div>

    <button class="vbtn" id="verifyBtn">
      <i class="ti ti-shield-check" aria-hidden="true" style="font-size:16px;vertical-align:-2px;margin-right:6px"></i>
      Verify
    </button>

    <p class="vtimer">Resend available in <span id="countdown">30</span>s</p>

    <p class="vresend">
      Didn't receive the code?
      <button id="resendBtn" disabled>Resend</button>
    </p>

    <hr class="vdivider">

    <p class="vchange">
      Wrong email?
      <button id="changeEmailBtn">Change email</button>
    </p>

    <div class="vmsg" id="message" role="alert"></div>
  </div>
</div>

<script>
const inputs = document.querySelectorAll('.otp-row input');
const verifyBtn = document.getElementById('verifyBtn');
const resendBtn = document.getElementById('resendBtn');
const countdownEl = document.getElementById('countdown');
const msgEl = document.getElementById('message');

inputs.forEach((inp, i) => {
  inp.addEventListener('input', () => {
    inp.value = inp.value.replace(/\D/g,'');
    inp.classList.toggle('filled', inp.value !== '');
    if (inp.value && i < inputs.length - 1) inputs[i+1].focus();
  });
  inp.addEventListener('keydown', e => {
    if (e.key === 'Backspace' && !inp.value && i > 0) inputs[i-1].focus();
    if (e.key === 'ArrowLeft' && i > 0) inputs[i-1].focus();
    if (e.key === 'ArrowRight' && i < inputs.length-1) inputs[i+1].focus();
  });
  inp.addEventListener('paste', e => {
    e.preventDefault();
    const text = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g,'').slice(0,6);
    [...text].forEach((ch, j) => { if (inputs[i+j]) { inputs[i+j].value = ch; inputs[i+j].classList.add('filled'); } });
    const next = inputs[Math.min(i + text.length, inputs.length-1)];
    if (next) next.focus();
  });
});

function showMsg(text, type) {
  msgEl.textContent = text;
  msgEl.className = 'vmsg ' + type;
  msgEl.style.display = 'block';
}

verifyBtn.addEventListener('click', () => {
  const code = [...inputs].map(i => i.value).join('');
  if (code.length < 6) { showMsg('Please enter all 6 digits.', 'err'); return; }
  verifyBtn.disabled = true;
  verifyBtn.textContent = 'Verifying…';
  setTimeout(() => {
    showMsg('Email verified successfully!', 'ok');
    verifyBtn.textContent = 'Verified';
  }, 1200);
});

let t = 30;
const timer = setInterval(() => {
  t--;
  countdownEl.textContent = t;
  if (t <= 0) {
    clearInterval(timer);
    countdownEl.closest('.vtimer').textContent = 'You can resend now.';
    resendBtn.disabled = false;
  }
}, 1000);

resendBtn.addEventListener('click', () => {
  resendBtn.disabled = true;
  showMsg('A new code has been sent to your email.', 'ok');
});

document.getElementById('changeEmailBtn').addEventListener('click', () => {
  showMsg('Redirecting to change your email…', 'ok');
});
</script>

<script src="js/transitions.js"></script>
</body>
</html>
