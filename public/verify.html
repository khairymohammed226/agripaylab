<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Email Verification</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
     background: linear-gradient(135deg, #0b2e2b, #004d40, #00796b);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      border-radius: 20px;
      padding: 30px;
      text-align: center;
      color: white;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* 🔥 اللوجو */
    .logo {
      margin-bottom: 15px;
    }

    .logo img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      padding: 8px;
      background: white;
      object-fit: contain;
      box-shadow: 0 0 20px rgba(0,255,200,0.4);
    }

    h2 {
      margin: 10px 0;
    }

    .subtitle {
      font-size: 14px;
      opacity: 0.8;
      margin-bottom: 20px;
    }

    .email {
      font-size: 13px;
      margin-bottom: 20px;
      opacity: 0.7;
    }

    .otp-box {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .otp-box input {
      width: 45px;
      height: 55px;
      text-align: center;
      font-size: 20px;
      border-radius: 10px;
      border: none;
      outline: none;
      background: rgba(255,255,255,0.2);
      color: white;
      transition: 0.2s;
    }

    .otp-box input:focus {
      background: rgba(255,255,255,0.4);
      transform: scale(1.1);
    }

    .verify-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #00c896, #00966c);      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .verify-btn:hover {
      background: #00a87a;
    }

    .verify-btn.loading {
      opacity: 0.7;
      pointer-events: none;
    }

    .resend {
      margin-top: 15px;
      font-size: 13px;
    }

    .resend span {
      color: #00c896;
      cursor: pointer;
    }

    .timer {
      margin-top: 10px;
      font-size: 12px;
      opacity: 0.6;
    }

    .message {
      margin-top: 15px;
      font-size: 14px;
    }

    .success {
      color: #00ffcc;
    }

    .error {
      color: #ff6b6b;
    }

  </style>
</head>

<body>

<div class="container">
  <div class="card">

    <!-- 🔥 هنا اللوجو -->
    <div class="logo">
      <img src="C:\Users\youss\OneDrive\Desktop\online banking\online banking\public\image\Picsart_25-10-01_17-11-01-636.png" alt="Bank Logo">
    </div>

    <h2>Email Verification</h2>

    <p class="subtitle">Enter the 6-digit code sent to your email</p>

    <div class="email">m***@gmail.com</div>

    <div class="otp-box">
      <input type="text" maxlength="1">
      <input type="text" maxlength="1">
      <input type="text" maxlength="1">
      <input type="text" maxlength="1">
      <input type="text" maxlength="1">
      <input type="text" maxlength="1">
    </div>

<button id="verifyBtn" class="verify-btn">Verify</button>
    <div class="timer">Resend available in <span id="countdown">30</span>s</div>

    <p class="resend">
      Didn't receive code?
      <span id="resendBtn">Resend</span>
    </p>

    <div id="message" class="message"></div>

  </div>
</div>

<script>
const otpInputs = document.querySelectorAll(".otp-box input");

otpInputs.forEach((input, index) => {
  input.addEventListener("input", () => {
    if (input.value.length === 1 && index < otpInputs.length - 1) {
      otpInputs[index + 1].focus();
    }
  });

  input.addEventListener("keydown", (e) => {
    if (e.key === "Backspace" && input.value === "" && index > 0) {
      otpInputs[index - 1].focus();
    }
  });
});

document.getElementById("verifyBtn").addEventListener("click", async () => {

  const inputs = document.querySelectorAll(".otp-box input");
  const otp = Array.from(inputs).map(input => input.value).join("");

  const userId = localStorage.getItem("verifyUserId");
  const msg = document.getElementById("message");

  if (otp.length < 6) {
    msg.textContent = "Please enter full code";
    msg.style.color = "red";
    return;
  }

  const btn = document.getElementById("verifyBtn");

  btn.disabled = true;
  btn.textContent = "Verifying...";

  try {
    const res = await fetch("https://agripay.site/verify-email", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ userId, otp })
    });

    const data = await res.json();

    if (!res.ok) {
      msg.textContent = data.message;
      msg.style.color = "red";

      btn.disabled = false;
      btn.textContent = "Verify";
      return;
    }

    msg.textContent = "Verified successfully ✅";
    msg.style.color = "green";

    setTimeout(() => {
      window.location.href = "add_card.html";
    }, 1500);

  } catch (err) {
    msg.textContent = "Server error";
    msg.style.color = "red";

    btn.disabled = false;
    btn.textContent = "Verify";
  }

});
</script>

</body>
</html>
