<head>

<title>CA Bank Dashboard</title>
<script>
  if (sessionStorage.getItem("isLoggedIn") !== "true") {
    window.location.href = "login.html";
  }
</script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />

<script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

 <link rel="stylesheet" href="css/wallet.css">
</head>
<body>

<div class="card">
  <header class="header">
    <div class="brand">
      <a href="dashboard.html">
        <img src="image/logomain.png" alt="CA Bank Logo">
      </a>
    </div>
    <nav class="nav">
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
      <a href="login.html">Login</a>
      <a href="register.html">Sign Up</a>
    </nav>
  </header>
<div class="body">
  <aside class="sidebar">
    <a class="item" href="dashboard.html">
      <img src="image/layout.png"alt="Dashboard">
      <span>Dashboard</span>
    </a>

    <a class="item active" href="bank.html">
      <img src="image/arrows.png" alt="Transfer">
      <span>Transfer</span>
    </a>

    <a class="item" href="card.html">
      <img src="image/card.png" alt="Card">
      <span>Card</span>
    </a>

    <a class="item" href="profile.html">
      <img src="image/account.png" alt="Profile">
      <span>Profile</span>
    </a>

    <a class="item" href="login.html" id="logoutLink">
      <img src="image/logout.png"  alt="Logout">
      <span>Logout</span>
    </a>
  </aside>

<main class="main">
  <section class="account-box">
   <h3>Account Details</h3>
    <p>username: <span id="userNameDisplay"></span></p>
    <p>account : <span id="accountNumberDisplay"></span></p>
  </section>

  <section class="send-box">
  <div class="icon-bar">
    <a class="icon" href="bank.html">
      <img src="https://i.postimg.cc/4ytt1NLd/mobile-banking-1.png" alt="Bank">
      <span>Bank</span>
    </a>

    <a class="icon active" href="wallet.html">
      <img src="https://i.postimg.cc/G2Tscm1J/wallet-1.png" alt="Wallet">
      <span>Wallet</span>
    </a>

    <a class="icon" href="atm.html">
      <img src="https://i.postimg.cc/6Q97GhJk/atm-machine.png" alt="ATM">
      <span>ATM</span>
    </a>
  </div>

    <h4>Send Money</h4>



<form id="step1">

<select id="walletProvider" required>

<option></option>

<option value="vodafone" data-logo="https://www.clipartmax.com/png/small/151-1517832_pay-with-vodafone-cash-vodafone-mobile-money-logo.png">
Vodafone Cash
</option>

<option value="orange" data-logo="https://upload.wikimedia.org/wikipedia/commons/c/c8/Orange_logo.svg">
Orange Money
</option>

<option value="etisalat" data-logo="https://forasna-images.wuzzuf-data.net/uploads/logos/thumb_clogo_2024-11-20-11-55-34_79LXmvNsQXUtOpntnSlIawXX.jpg">
Etisalat Cash
</option>

<option value="wepay" data-logo="https://play-lh.googleusercontent.com/6XZKvhiCf64MnUVMl6KqcWKq97dzql9OVD9ctaNnt1VTtJS3RE6Dsk6GCM7e_8nnOzE">
WE Pay
</option>

</select>

<input type="text" placeholder="Wallet Number" required>

<input 
type="text" 
placeholder="Amount" 
inputmode="numeric"
pattern="[0-9]*"
required
>

      <button type="submit">Next</button>
    </form>


<div id="walletMessage" class="atm-message"></div>

<button id="goDashboardBtn" style="display:none; margin-top:10px;">
Go to Dashboard
</button><form id="step2" class="step-2">
  <input type="password" placeholder="Password" required>
  <h4>Confirm Transfer</h4>
  <div class="confirm-details"></div>

  <!-- 👇 حط الرسالة هنا -->
  

  <button type="button" id="backBtn">Back</button>
  <button type="submit">Submit</button>
</form>


  </section>
  
</main>

  </div>
</div>

<script src="js/wallet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/transitions.js"></script>
</body>
</html>
